name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (production)
        if: github.ref == 'refs/heads/main'
        run: pnpm build
        env:
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Build (PR preview)
        if: github.event_name == 'pull_request'
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          sed -i "s|base: './'|base: '/team-business-hub/pr-${PR_NUM}/'|" vite.config.ts
          pnpm build
        env:
          VITE_APP_VERSION: pr-${{ github.event.pull_request.number }}

      - name: Generate SBOM
        if: github.ref == 'refs/heads/main'
        run: |
          npx @cyclonedx/cdxgen -o dist/sbom.json -t pnpm || true

      - name: Restore source index.html
        run: git checkout index.html

      - name: Deploy PR Preview
        if: github.event_name == 'pull_request'
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="preview/pr-${PR_NUM}"
          git checkout --orphan ${BRANCH}
          git rm -rf . 2>/dev/null || true
          cp -r dist/* . 2>/dev/null || true
          cp dist/.* . 2>/dev/null || true
          git add -A
          git commit -m "PR #${PR_NUM} preview" --allow-empty
          git push origin ${BRANCH} --force

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr_num = context.payload.pull_request.number;
            const url = `https://as5551238.github.io/team-business-hub/pr-${pr_num}/`;
            const body = `**Preview Deployment**\n\nURL: ${url}\n\nDeployed from commit ${context.sha.substring(0, 7)}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: pr_num
            });
            const existing = comments.find(c => c.body.startsWith('**Preview Deployment**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr_num, body
              });
            }

      - name: Upload artifact (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
